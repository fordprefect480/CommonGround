<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f5233" />
    <meta name="robots" content="index, follow" />

    <!-- Default metadata for non-JS crawlers and link unfurlers. The <Seo>
         component overrides these per route once the app has loaded. -->
    <meta
      name="description"
      content="Seaford Wetlands Community Garden - South Australia's largest community garden, with raised beds for lease, an Indigenous food garden, a public orchard, workshops and events in Seaford, SA."
    />
    <link rel="canonical" href="https://seafordwetlandscommunitygarden.com/" />

    <meta property="og:site_name" content="Seaford Wetlands Community Garden" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://seafordwetlandscommunitygarden.com/" />
    <meta property="og:title" content="Seaford Wetlands Community Garden" />
    <meta
      property="og:description"
      content="South Australia's largest community garden - raised beds for lease, an Indigenous food garden, a public orchard, workshops and events in Seaford, SA."
    />
    <meta property="og:image" content="https://seafordwetlandscommunitygarden.com/swcg/hero-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Seaford Wetlands Community Garden" />
    <meta
      name="twitter:description"
      content="South Australia's largest community garden - raised beds for lease, an Indigenous food garden, a public orchard, workshops and events in Seaford, SA."
    />
    <meta name="twitter:image" content="https://seafordwetlandscommunitygarden.com/swcg/hero-image.png" />

    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Preload the mobile hero image so the browser starts fetching it during
         HTML parse, in parallel with the JS bundle, rather than waiting for
         React to render the <img> tag (~4.5 s later). Scoped to mobile widths
         because desktop loads the video instead. -->
    <link
      rel="preload"
      as="image"
      href="/swcg/hero-image.webp"
      fetchpriority="high"
      media="(max-width: 767px)"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Kept render-blocking on purpose: loading this async (media="print" swap)
         made the hero <h1> paint in a fallback font and then reflow when
         Bricolage Grotesque arrived, spiking CLS to ~0.35. Blocking on the font
         CSS keeps CLS ~0 at the cost of ~150ms; the preconnects above soften it. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,500;10..48,600;10..48,700;10..48,800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <title>Seaford Wetlands Community Garden</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
